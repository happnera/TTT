<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Hearts vs Crowns Tic-Tac-Toe</title>
  <style>
    :root{
      --bg1:#fff7fc;
      --bg2:#f7f1ff;
      --card:#ffffff;
      --text:#4b3b57;
      --muted:#7d6f87;
      --line:#eadff0;
      --heart:#ff5ca8;
      --heart-soft:#ffd6e9;
      --crown:#8a49ff;
      --crown-soft:#e4d6ff;
      --button:#f5efff;
      --button-hover:#eee2ff;
      --shadow:0 14px 40px rgba(119, 86, 151, 0.14);
      --win:#fff7ba;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #ffe3f1 0%, transparent 28%),
        radial-gradient(circle at top right, #eadcff 0%, transparent 30%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .app{
      width:min(100%, 520px);
      background:rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border:1px solid rgba(255,255,255,0.7);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:24px 18px 20px;
    }

    h1{
      margin:0 0 8px;
      text-align:center;
      font-size:clamp(28px, 5vw, 40px);
      line-height:1.1;
      letter-spacing:0.2px;
    }

    .title-heart{ color:var(--heart); }
    .title-crown{ color:var(--crown); }

    .subtitle{
      text-align:center;
      color:var(--muted);
      margin:0 0 18px;
      font-size:15px;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:14px;
    }

    button{
      appearance:none;
      border:none;
      border-radius:16px;
      padding:14px 12px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      background:var(--button);
      color:var(--text);
      transition:transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
      box-shadow:0 6px 18px rgba(135, 109, 167, 0.12);
    }

    button:hover{ background:var(--button-hover); }
    button:active{ transform:scale(0.98); }

    .heart-btn{
      background:linear-gradient(180deg, #fff1f8, #ffe0ee);
      color:#c33678;
    }

    .crown-btn{
      background:linear-gradient(180deg, #f2ebff, #e2d2ff);
      color:#6f34db;
    }

    .status{
      text-align:center;
      margin:0 0 16px;
      padding:12px 14px;
      border-radius:16px;
      background:#fbf8ff;
      border:1px solid var(--line);
      font-size:17px;
      font-weight:700;
      min-height:52px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
      margin-bottom:14px;
    }

    .cell{
      aspect-ratio:1/1;
      border-radius:22px;
      border:2px solid var(--line);
      background:#fff;
      font-size:clamp(44px, 10vw, 68px);
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      box-shadow:0 8px 18px rgba(135, 109, 167, 0.08);
    }

    .cell:hover{
      transform:translateY(-1px);
    }

    .cell.heart{
      background:linear-gradient(180deg, #fff6fb, var(--heart-soft));
    }

    .cell.crown{
      background:linear-gradient(180deg, #faf7ff, var(--crown-soft));
    }

    .cell.win{
      background:linear-gradient(180deg, #fffde7, var(--win));
      border-color:#f0d85a;
    }

    .symbol-heart{
      color:var(--heart);
      text-shadow:0 2px 0 rgba(255,255,255,0.9);
    }

    .symbol-crown{
      color:var(--crown);
      text-shadow:0 2px 0 rgba(255,255,255,0.9);
    }

    .bottom-controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .small{
      font-size:15px;
      font-weight:700;
    }

    .legend{
      margin-top:14px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    @media (max-width: 420px){
      .app{ padding:20px 14px 16px; }
      .controls, .bottom-controls{ grid-template-columns:1fr; }
      .status{ font-size:16px; }
      .cell{ border-radius:18px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1><span class="title-heart">Hearts</span> vs <span class="title-crown">Crowns</span></h1>
    <p class="subtitle">Pick who goes first, then take turns on the board.</p>

    <div class="controls">
      <button class="heart-btn" id="heartsFirstBtn" type="button">♥ Hearts go first</button>
      <button class="crown-btn" id="crownsFirstBtn" type="button">♛ Crowns go first</button>
    </div>

    <div class="status" id="status">Choose who goes first to begin.</div>

    <div class="board" id="board" aria-label="Tic-tac-toe board">
      <button class="cell" data-index="0" aria-label="Cell 1"></button>
      <button class="cell" data-index="1" aria-label="Cell 2"></button>
      <button class="cell" data-index="2" aria-label="Cell 3"></button>
      <button class="cell" data-index="3" aria-label="Cell 4"></button>
      <button class="cell" data-index="4" aria-label="Cell 5"></button>
      <button class="cell" data-index="5" aria-label="Cell 6"></button>
      <button class="cell" data-index="6" aria-label="Cell 7"></button>
      <button class="cell" data-index="7" aria-label="Cell 8"></button>
      <button class="cell" data-index="8" aria-label="Cell 9"></button>
    </div>

    <div class="bottom-controls">
      <button class="small" id="restartSameBtn" type="button">Restart same first player</button>
      <button class="small" id="clearBtn" type="button">Clear board</button>
    </div>

    <div class="legend">Hearts = pink ♥ &nbsp;&nbsp;•&nbsp;&nbsp; Crowns = purple ♛</div>
  </div>

  <script>
    const cells = Array.from(document.querySelectorAll('.cell'));
    const statusEl = document.getElementById('status');
    const heartsFirstBtn = document.getElementById('heartsFirstBtn');
    const crownsFirstBtn = document.getElementById('crownsFirstBtn');
    const restartSameBtn = document.getElementById('restartSameBtn');
    const clearBtn = document.getElementById('clearBtn');

    let board = Array(9).fill('');
    let currentPlayer = '';
    let firstPlayer = '';
    let gameOver = false;

    const wins = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function symbol(player) {
      return player === 'heart'
        ? '<span class="symbol-heart">♥</span>'
        : '<span class="symbol-crown">♛</span>';
    }

    function playerLabel(player) {
      return player === 'heart' ? 'Hearts' : 'Crowns';
    }

    function setStatus(message) {
      statusEl.innerHTML = message;
    }

    function render() {
      cells.forEach((cell, index) => {
        const value = board[index];
        cell.innerHTML = value ? symbol(value) : '';
        cell.classList.remove('heart', 'crown');
        if (value === 'heart') cell.classList.add('heart');
        if (value === 'crown') cell.classList.add('crown');
      });
    }

    function clearWinStyles() {
      cells.forEach(cell => cell.classList.remove('win'));
    }

    function startGame(player) {
      firstPlayer = player;
      currentPlayer = player;
      board = Array(9).fill('');
      gameOver = false;
      clearWinStyles();
      render();
      setStatus(`${symbol(currentPlayer)} ${playerLabel(currentPlayer)} turn`);
    }

    function restartSameFirstPlayer() {
      if (!firstPlayer) {
        setStatus('Choose Hearts or Crowns to go first.');
        return;
      }
      startGame(firstPlayer);
    }

    function checkWinner() {
      for (const combo of wins) {
        const [a,b,c] = combo;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          combo.forEach(i => cells[i].classList.add('win'));
          return board[a];
        }
      }
      return null;
    }

    function isBoardFull() {
      return board.every(Boolean);
    }

    function nextPlayer() {
      currentPlayer = currentPlayer === 'heart' ? 'crown' : 'heart';
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const index = Number(cell.dataset.index);

        if (!firstPlayer) {
          setStatus('Choose Hearts or Crowns to go first.');
          return;
        }

        if (gameOver || board[index]) return;

        board[index] = currentPlayer;
        render();

        const winner = checkWinner();
        if (winner) {
          gameOver = true;
          setStatus(`${symbol(winner)} ${playerLabel(winner)} win!`);
          return;
        }

        if (isBoardFull()) {
          gameOver = true;
          setStatus('It’s a tie!');
          return;
        }

        nextPlayer();
        setStatus(`${symbol(currentPlayer)} ${playerLabel(currentPlayer)} turn`);
      });
    });

    heartsFirstBtn.addEventListener('click', () => startGame('heart'));
    crownsFirstBtn.addEventListener('click', () => startGame('crown'));
    restartSameBtn.addEventListener('click', restartSameFirstPlayer);
    clearBtn.addEventListener('click', () => {
      board = Array(9).fill('');
      gameOver = false;
      clearWinStyles();
      render();
      if (firstPlayer) {
        currentPlayer = firstPlayer;
        setStatus(`${symbol(currentPlayer)} ${playerLabel(currentPlayer)} turn`);
      } else {
        setStatus('Choose who goes first to begin.');
      }
    });

    render();
  </script>
</body>
</html>
